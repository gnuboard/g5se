name: Closed Beta 신청
description: GNUBOARD5 SECOND EDITION Closed Beta 참여 신청
title: "[Closed Beta] "
labels: ["closed-beta", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        GNUBOARD5 SECOND EDITION Closed Beta 참여 신청서입니다.

        신청 내용은 공개 Issue로 등록될 수 있습니다.
        이메일, 전화번호, 비밀번호, 서버 접속 정보 등 민감한 개인정보는 작성하지 마세요.

  - type: input
    id: nickname
    attributes:
      label: 이름 또는 닉네임
      description: SIR 닉네임 또는 GitHub 닉네임을 적어주세요.
      placeholder: 예) siruser
    validations:
      required: true

  - type: input
    id: organization
    attributes:
      label: 소속 또는 운영 사이트
      description: 공개 가능한 범위에서만 적어주세요.
      placeholder: 예) 개인 운영자 / 웹에이전시 / example.com
    validations:
      required: false

  - type: dropdown
    id: experience
    attributes:
      label: 그누보드 사용 경험
      options:
        - 처음 사용합니다
        - 그누보드5를 사용해 본 적이 있습니다
        - 그누보드5 사이트를 운영 중입니다
        - 그누보드 개발 또는 커스터마이징 경험이 있습니다
    validations:
      required: true

  - type: textarea
    id: current-usage
    attributes:
      label: 현재 사용 환경 또는 운영 경험
      description: 사용 중인 PHP/MySQL 버전, 운영 형태, 이전 그누보드 사용 경험 등을 적어주세요.
      placeholder: 예) PHP 8.2, MySQL 8 환경에서 그누보드5 커뮤니티를 운영 중입니다.
    validations:
      required: true

  - type: textarea
    id: test-plan
    attributes:
      label: Closed Beta에서 테스트하려는 내용
      description: 어떤 기능, 환경, 마이그레이션, 운영 시나리오를 테스트할 예정인지 적어주세요.
      placeholder: 예) 기존 그누보드5 사이트의 데이터 이전, 게시판/회원/스킨 호환성을 테스트하고 싶습니다.
    validations:
      required: true

  - type: textarea
    id: feedback-plan
    attributes:
      label: 피드백 가능 범위
      description: 테스트 후 어떤 방식의 피드백을 제공할 수 있는지 적어주세요.
      placeholder: 예) 설치 오류, UI 개선점, 호환성 문제를 Issue로 정리해 공유하겠습니다.
    validations:
      required: false

  - type: checkboxes
    id: agreement
    attributes:
      label: 확인 사항
      options:
        - label: Closed Beta 안내와 저장소 접근 정책을 이해했습니다.
          required: true
        - label: 신청 내용이 공개될 수 있음을 이해했습니다.
          required: true
        - label: 민감한 개인정보나 접속 정보를 Issue에 작성하지 않겠습니다.
          required: true
        - label: 다 같이 만들어가는 솔루션입니다. 구경만 하시거나 불평만 늘어 놓는 분은 정중히 사절합니다.
          required: true
